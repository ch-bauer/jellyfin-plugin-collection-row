name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Build
        run: dotnet publish src/Jellyfin.Plugin.CollectionSection -c Release -o publish

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir package
          cp publish/Jellyfin.Plugin.CollectionSection.dll package/
          cp meta.json package/
          (cd package && zip "../collection-section_${VERSION}.zip" ./*)
          echo "MD5 checksum for manifest.json:"
          md5sum "collection-section_${VERSION}.zip"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: collection-section_*.zip
          generate_release_notes: true
